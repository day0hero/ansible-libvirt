---
- name: Install bastion packages
  ansible.builtin.dnf:
    name:
      - haproxy
      - podman
      - httpd-tools
      - openssl
      - firewalld
      - python3-firewall
      - jq
      - tar
    state: present

# --- HAProxy ---

- name: Configure HAProxy
  ansible.builtin.template:
    src: haproxy.cfg.j2
    dest: /etc/haproxy/haproxy.cfg
    mode: "0644"
    backup: true
  notify: restart haproxy

- name: Allow HAProxy to bind to any port (SELinux)
  ansible.posix.seboolean:
    name: haproxy_connect_any
    state: true
    persistent: true

- name: Enable and start HAProxy
  ansible.builtin.systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  loop:
    - haproxy
    - firewalld

# --- Firewall ---

- name: Open firewall ports for OpenShift
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    immediate: true
    state: enabled
  loop:
    - "6443/tcp"
    - "22623/tcp"
    - "80/tcp"
    - "443/tcp"
    - "{{ bastion.mirror_registry_port | default(8443) }}/tcp"
    - "{{ bastion.haproxy_stats_port | default(9000) }}/tcp"

# --- OCP CLI tools ---

- name: Download OpenShift client tarball
  ansible.builtin.get_url:
    url: "{{ openshift_client_url }}"
    dest: /tmp/openshift-client-linux.tar.gz
    mode: "0644"

- name: Extract oc and kubectl
  ansible.builtin.command:
    cmd: tar -xzf /tmp/openshift-client-linux.tar.gz -C /usr/local/bin oc kubectl
    creates: /usr/local/bin/oc

- name: Download openshift-install tarball
  ansible.builtin.get_url:
    url: "{{ openshift_install_url }}"
    dest: /tmp/openshift-install-linux.tar.gz
    mode: "0644"

- name: Extract openshift-install
  ansible.builtin.command:
    cmd: tar -xzf /tmp/openshift-install-linux.tar.gz -C /usr/local/bin openshift-install
    creates: /usr/local/bin/openshift-install

- name: Set executable permissions on CLI tools
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0755"
  loop:
    - /usr/local/bin/oc
    - /usr/local/bin/kubectl
    - /usr/local/bin/openshift-install

# --- Quay mirror registry ---

- name: Check if Quay mirror registry is already installed
  ansible.builtin.command:
    cmd: podman ps --filter name=quay-app --format "{{ '{{' }}.Names{{ '}}' }}"
  register: _quay_running
  changed_when: false
  failed_when: false

- name: Install Quay mirror registry
  when: _quay_running.stdout | default('') | trim == ''
  block:
    - name: Create mirror-registry staging directory
      ansible.builtin.file:
        path: /opt/mirror-registry
        state: directory
        mode: "0755"

    - name: Download mirror-registry tarball
      ansible.builtin.get_url:
        url: "{{ mirror_registry_url }}"
        dest: /tmp/mirror-registry.tar.gz
        mode: "0644"

    - name: Extract mirror-registry tarball
      ansible.builtin.unarchive:
        src: /tmp/mirror-registry.tar.gz
        dest: /opt/mirror-registry
        remote_src: true

    - name: Run mirror-registry install
      ansible.builtin.command:
        cmd: >-
          /opt/mirror-registry/mirror-registry install
          --quayHostname {{ quay_hostname }}
          --quayRoot {{ quay_root }}
          --targetPort {{ bastion.mirror_registry_port | default(8443) }}
          --initPassword {{ quay_init_password }}
          --verbose
      timeout: 600

- name: Trust the Quay CA certificate
  ansible.builtin.copy:
    src: "{{ quay_root }}/quay-rootCA/rootCA.pem"
    dest: /etc/pki/ca-trust/source/anchors/quay-mirror-registry.crt
    mode: "0644"
    remote_src: true
  notify: update ca trust

- name: Flush handlers to apply CA trust now
  ansible.builtin.meta: flush_handlers

- name: Wait for Quay to be responding
  ansible.builtin.uri:
    url: "https://{{ quay_hostname }}:{{ bastion.mirror_registry_port | default(8443) }}/v2/"
    method: GET
    validate_certs: true
    status_code: [200, 401]
  register: _quay_health
  retries: 12
  delay: 10
  until: _quay_health.status in [200, 401]

# --- DNS ---

- name: Configure DNS forwarding (bastion as DNS relay to cluster network)
  ansible.builtin.copy:
    content: |
      server=/{{ cluster_name }}.{{ cluster_domain }}/{{ cluster_dns.api_vip }}
    dest: /etc/NetworkManager/dnsmasq.d/{{ cluster_name }}.conf
    mode: "0644"
  notify: restart networkmanager
