---
- name: Create mirror workspace directory
  ansible.builtin.file:
    path: "{{ ocp_mirror_workspace }}"
    state: directory
    mode: "0755"

- name: Create Docker config directory
  ansible.builtin.file:
    path: /root/.docker
    state: directory
    mode: "0700"

- name: Copy Red Hat pull secret to bastion
  ansible.builtin.copy:
    src: "{{ pull_secret_path }}"
    dest: "{{ ocp_mirror_workspace }}/pull-secret-redhat.json"
    mode: "0600"

- name: Read Red Hat pull secret
  ansible.builtin.slurp:
    src: "{{ ocp_mirror_workspace }}/pull-secret-redhat.json"
  register: _rh_pull_secret_raw

- name: Parse Red Hat pull secret
  ansible.builtin.set_fact:
    _rh_pull_secret: "{{ _rh_pull_secret_raw.content | b64decode | from_json }}"

- name: Build registry auth token
  ansible.builtin.set_fact:
    _registry_auth: "{{ (quay_init_user + ':' + quay_init_password) | b64encode }}"

- name: Merge pull secrets (Red Hat + local Quay registry)
  ansible.builtin.set_fact:
    _merged_pull_secret: >-
      {{ _rh_pull_secret | combine({
        'auths': _rh_pull_secret.auths | combine({
          _registry_url: {'auth': _registry_auth, 'email': ''}
        })
      }) }}

- name: Write merged pull secret
  ansible.builtin.copy:
    content: "{{ _merged_pull_secret | to_nice_json }}"
    dest: /root/.docker/config.json
    mode: "0600"

- name: Verify podman login to Quay mirror registry
  ansible.builtin.command:
    cmd: "podman login {{ _registry_url }} --authfile /root/.docker/config.json"
  changed_when: false

- name: Verify podman login to registry.redhat.io
  ansible.builtin.command:
    cmd: "podman login registry.redhat.io --authfile /root/.docker/config.json"
  changed_when: false
